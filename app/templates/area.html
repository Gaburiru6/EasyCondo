<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>EasyCondo - Gerenciar Áreas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    </style>
</head>
<body class="bg-slate-50 font-['Inter']">
    <div class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Gerenciamento de Áreas Comuns</h1>
            <button onclick="window.location.href='/dashboard'" class="text-blue-600 font-semibold hover:underline">Voltar ao Dashboard</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-xl font-bold mb-4">Nova Área</h3>
                <form id="formArea" class="space-y-4">
                    
                    <input type="hidden" id="area_id" value="">

                    <input type="text" id="nome" placeholder="Nome da Área (ex: Salão de Festas)" class="w-full p-2 border rounded-lg" required>
                    <textarea id="descricao" placeholder="Descrição" class="w-full p-2 border rounded-lg"></textarea>
                    
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="possui_taxa">
                        <label for="possui_taxa">Possui taxa de uso?</label>
                    </div>
                    
                    <input type="number" id="taxa" placeholder="Valor da Taxa (R$)" class="w-full p-2 border rounded-lg">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="limite_semanal" placeholder="Lim. Semanal" class="w-full p-2 border rounded-lg">
                        <input type="number" id="limite_mensal" placeholder="Lim. Mensal" class="w-full p-2 border rounded-lg">
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-slate-600">Limite Cancelamento/Edição (Dias)</label>
                        <input type="number" id="limite_cancelamento_edicao_dias" placeholder="Ex: 2" class="w-full p-2 border rounded-lg">
                    </div>
                    
                    <div class="flex gap-2 pt-2">
                        <button type="button" id="btnCancelar" onclick="cancelarEdicao()" class="hidden w-1/3 bg-slate-200 text-slate-700 py-2 rounded-lg font-bold hover:bg-slate-300 transition">Cancelar</button>
                        <button type="submit" id="btnSalvar" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">Salvar Área</button>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-xl font-bold mb-4">Áreas Cadastradas</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b text-slate-500 text-sm">
                                <th class="pb-3">Nome</th>
                                <th class="pb-3">Taxa</th>
                                <th class="pb-3">Limites</th>
                                <th class="pb-3 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaAreas">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/area.js"></script>
</body>
</html>
