<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EasyCondo - Reservas</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
<style>
body { font-family: 'Inter', sans-serif; background: #f8fafc; }
h1, h2, h3 { font-family: 'Manrope', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body>
<aside class="hidden lg:flex h-screen w-64 fixed left-0 top-0 bg-slate-50 border-r flex-col p-4 space-y-2 z-50">
    <div class="mb-8 px-2">
        <h1 class="text-lg font-black text-blue-700">EasyCondo</h1>
        <p class="text-xs text-slate-500">Portal do Síndico</p>
    </div>

    <nav class="flex-1 space-y-1">
        <a href="/sindico/dashboard" class="flex items-center gap-3 px-3 py-2 text-slate-600 hover:text-blue-600">
            <span class="material-symbols-outlined">dashboard</span>
            Dashboard
        </a>
        <a href="/sindico/area" class="flex items-center gap-3 px-3 py-2 text-slate-600 hover:text-blue-600">
            <span class="material-symbols-outlined">handyman</span>
            Áreas
        </a>
        <a href="/sindico/reservas" class="flex items-center gap-3 px-3 py-2 bg-white text-blue-700 font-bold rounded-lg">
            <span class="material-symbols-outlined">event_available</span>
            Reservas
        </a>
        <a href="/sindico/moradores" class="flex items-center gap-3 px-3 py-2 text-slate-600 hover:text-blue-600">
            <span class="material-symbols-outlined">groups</span>
            Moradores
        </a>
    </nav>
</aside>

<nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
    <a href="/sindico/dashboard" class="flex flex-col items-center text-slate-500">
        <span class="material-symbols-outlined text-2xl">dashboard</span>
        <span class="text-[10px]">Dash</span>
    </a>
    <a href="/sindico/area" class="flex flex-col items-center text-slate-500">
        <span class="material-symbols-outlined text-2xl">handyman</span>
        <span class="text-[10px]">Áreas</span>
    </a>
    <a href="/sindico/reservas" class="flex flex-col items-center text-blue-700">
        <span class="material-symbols-outlined text-2xl">event_available</span>
        <span class="text-[10px] font-bold">Reservas</span>
    </a>
</nav>

<main class="lg:ml-64 p-6 pb-24 lg:pb-6">
    <header class="mb-6">
        <h2 class="text-3xl font-extrabold text-slate-900">Reservas do Condomínio</h2>
        <p class="text-sm text-slate-500">Visualização consolidada das reservas ativas.</p>
    </header>

    <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
            <div class="md:col-span-2">
                <label for="filtroBusca" class="text-xs font-semibold text-slate-600">Pesquisar por área ou morador</label>
                <input id="filtroBusca" type="text" placeholder="Ex.: salão, João" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2" />
            </div>
            <div>
                <label for="filtroStatus" class="text-xs font-semibold text-slate-600">Status</label>
                <select id="filtroStatus" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="">Todos</option>
                    <option value="CONFIRMADA">Confirmada</option>
                    <option value="PENDENTE_PAGAMENTO">Pendente pagamento</option>
                    <option value="CANCELADA">Cancelada</option>
                </select>
            </div>
            <div>
                <label for="filtroOrdenar" class="text-xs font-semibold text-slate-600">Ordenar por</label>
                <select id="filtroOrdenar" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="data">Data</option>
                    <option value="area">Área</option>
                    <option value="morador">Morador</option>
                    <option value="status">Status</option>
                </select>
            </div>
            <div>
                <label for="filtroOrdem" class="text-xs font-semibold text-slate-600">Ordem</label>
                <select id="filtroOrdem" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="asc">Crescente</option>
                    <option value="desc">Decrescente</option>
                </select>
            </div>
        </div>
        <div class="mt-3 flex gap-2">
            <button id="btnAplicarFiltros" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold">Aplicar filtros</button>
            <button id="btnLimparFiltros" class="px-4 py-2 rounded-lg border border-slate-300 bg-white text-sm font-semibold text-slate-700">Limpar</button>
        </div>
    </section>

    <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-100 text-slate-600 text-xs uppercase tracking-wide">
                    <tr>
                        <th class="px-4 py-3">ID</th>
                        <th class="px-4 py-3">Área</th>
                        <th class="px-4 py-3">Morador</th>
                        <th class="px-4 py-3">Data</th>
                        <th class="px-4 py-3">Horário</th>
                        <th class="px-4 py-3">Status</th>
                    </tr>
                </thead>
                <tbody id="listaReservas" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </section>

    <p id="resumoFiltros" class="mt-3 text-xs text-slate-500"></p>
</main>

<script>
let reservasOriginais = [];

function normalizarTexto(valor) {
    return String(valor || '').toLowerCase();
}

function obterFiltros() {
    return {
        busca: document.getElementById('filtroBusca').value.trim().toLowerCase(),
        status: document.getElementById('filtroStatus').value,
        ordenarPor: document.getElementById('filtroOrdenar').value,
        ordem: document.getElementById('filtroOrdem').value
    };
}

function ordenarReservas(lista, ordenarPor, ordem) {
    const multiplicador = ordem === 'desc' ? -1 : 1;

    return [...lista].sort((a, b) => {
        let valorA = '';
        let valorB = '';

        if (ordenarPor === 'data') {
            const dataA = String(a.data_reserva || '').split('T')[0] || '';
            const dataB = String(b.data_reserva || '').split('T')[0] || '';
            const inicioA = String(a.horario_inicio || '').slice(0, 5);
            const inicioB = String(b.horario_inicio || '').slice(0, 5);
            valorA = `${dataA} ${inicioA}`;
            valorB = `${dataB} ${inicioB}`;
        } else if (ordenarPor === 'area') {
            valorA = normalizarTexto(a.area_nome || a.area_id);
            valorB = normalizarTexto(b.area_nome || b.area_id);
        } else if (ordenarPor === 'morador') {
            valorA = normalizarTexto(a.morador_nome || a.morador_id);
            valorB = normalizarTexto(b.morador_nome || b.morador_id);
        } else if (ordenarPor === 'status') {
            valorA = normalizarTexto(a.status);
            valorB = normalizarTexto(b.status);
        }

        if (valorA < valorB) return -1 * multiplicador;
        if (valorA > valorB) return 1 * multiplicador;
        return 0;
    });
}

function aplicarFiltros() {
    const filtros = obterFiltros();
    let lista = [...reservasOriginais];

    if (filtros.busca) {
        lista = lista.filter((reserva) => {
            const area = normalizarTexto(reserva.area_nome || reserva.area_id);
            const morador = normalizarTexto(reserva.morador_nome || reserva.morador_id);
            return area.includes(filtros.busca) || morador.includes(filtros.busca);
        });
    }

    if (filtros.status) {
        lista = lista.filter((reserva) => String(reserva.status || '').toUpperCase() === filtros.status);
    }

    lista = ordenarReservas(lista, filtros.ordenarPor, filtros.ordem);
    renderizarReservas(lista);
}

function limparFiltros() {
    document.getElementById('filtroBusca').value = '';
    document.getElementById('filtroStatus').value = '';
    document.getElementById('filtroOrdenar').value = 'data';
    document.getElementById('filtroOrdem').value = 'asc';
    aplicarFiltros();
}

function renderizarReservas(reservas) {
    const tbody = document.getElementById('listaReservas');
    const resumo = document.getElementById('resumoFiltros');

    tbody.innerHTML = '';

    reservas.forEach((reserva) => {
        const data = String(reserva.data_reserva || '').split('T')[0] || '-';
        const inicio = String(reserva.horario_inicio || '').slice(0, 5);
        const fim = String(reserva.horario_fim || '').slice(0, 5);

        tbody.innerHTML += `
            <tr>
                <td class="px-4 py-3 text-sm font-semibold text-slate-700">${reserva.id}</td>
                <td class="px-4 py-3 text-sm">${reserva.area_nome || reserva.area_id}</td>
                <td class="px-4 py-3 text-sm">${reserva.morador_nome || reserva.morador_id}</td>
                <td class="px-4 py-3 text-sm">${data}</td>
                <td class="px-4 py-3 text-sm">${inicio} - ${fim}</td>
                <td class="px-4 py-3 text-sm font-semibold">${reserva.status}</td>
            </tr>
        `;
    });

    if (reservas.length === 0) {
        tbody.innerHTML = '<tr><td class="px-4 py-4 text-sm text-slate-500" colspan="6">Nenhuma reserva encontrada para os filtros aplicados.</td></tr>';
    }

    resumo.innerText = `Mostrando ${reservas.length} de ${reservasOriginais.length} reservas.`;
}

async function carregarReservas() {
    try {
        const res = await fetch('/api/reserva/condominio/ativas');
        const reservas = await res.json();
        reservasOriginais = Array.isArray(reservas) ? reservas : [];
        aplicarFiltros();
    } catch (error) {
        const tbody = document.getElementById('listaReservas');
        tbody.innerHTML = '<tr><td class="px-4 py-4 text-sm text-red-600" colspan="6">Erro ao carregar reservas.</td></tr>';
    }
}

document.getElementById('btnAplicarFiltros').addEventListener('click', aplicarFiltros);
document.getElementById('btnLimparFiltros').addEventListener('click', limparFiltros);
document.getElementById('filtroBusca').addEventListener('input', aplicarFiltros);
document.getElementById('filtroStatus').addEventListener('change', aplicarFiltros);
document.getElementById('filtroOrdenar').addEventListener('change', aplicarFiltros);
document.getElementById('filtroOrdem').addEventListener('change', aplicarFiltros);

document.addEventListener('DOMContentLoaded', carregarReservas);
</script>
</body>
</html>
