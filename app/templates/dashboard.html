<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Síndico</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<div class="container">

    <!-- 🔹 Cards -->
    <div class="cards">
        <div class="card">
            <h3>Moradores</h3>
            <p id="totalMoradores">0</p>
        </div>

        <div class="card">
            <h3>Reservas</h3>
            <p id="totalReservas">0</p>
        </div>
    </div>

    <div class="content">

        <!-- 🔹 ESQUERDA -->
        <div class="left">

            <h3>Cadastrar Área</h3>

            <form id="areaForm">
                <input type="text" placeholder="Nome" id="nome" required>
                <input type="text" placeholder="Descrição" id="descricao">

                <input type="number" placeholder="Taxa (opcional)" id="taxa">
                <label><input type="checkbox" id="possui_taxa"> Possui taxa</label>

                <input type="number" placeholder="Antecedência (horas)" id="antecedencia">

                <input type="number" placeholder="Limite semanal" id="limite_semanal">
                <input type="number" placeholder="Limite mensal" id="limite_mensal">

                <input type="number" placeholder="Tempo desistência (h)" id="desistencia">

                <button type="submit">Cadastrar</button>
            </form>

        </div>

        <!-- 🔹 DIREITA -->
        <div class="right">

            <h3>Solicitações</h3>
            <div id="listaSolicitacoes"></div>

            <h3>Reservas</h3>
            <div id="listaReservas"></div>

        </div>

    </div>

</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
