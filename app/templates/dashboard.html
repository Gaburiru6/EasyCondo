<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Síndico</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<div class="container">

    <!-- 🔹 Cards -->
    <div class="cards">
        <div class="card">
            <h3>Moradores</h3>
            <p id="totalMoradores">0</p>
        </div>

        <div class="card">
            <h3>Reservas</h3>
            <p id="totalReservas">0</p>
        </div>
    </div>

    <div class="content">

        <!-- 🔹 ESQUERDA -->
        <div class="left">

            <div class="cards">
                <div class="card">
                    <h3>Configurações</h3>
                    <button onclick="window.location.href='/area'" style="margin-top: 10px; background-color: #1a56db; color: white; padding: 10px; border-radius: 8px; width: 100%;">
                        Gerenciar Áreas
                    </button>
                </div>
            </div>
            
        </div>

        <!-- 🔹 DIREITA -->
        <div class="right">

            <h3>Solicitações</h3>
            <div id="listaSolicitacoes"></div>

            <h3>Reservas</h3>
            <div id="listaReservas"></div>

        </div>

    </div>

</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
