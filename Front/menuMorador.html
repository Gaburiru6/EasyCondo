<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Morador - Portal Harmony</title>
    <link rel="stylesheet" href="menuMorador.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-nav">
        <div class="logo">🏢 EasyCondo</div>
        <div class="user-section">
            <span class="bell">🔔</span>
            <div class="profile-info">
                <strong>Resident Profile</strong>
                <span>Unit 402, Block A</span>
            </div>
            <div class="avatar">👤</div>
            <span class="logout">➔</span>
        </div>
    </header>

    <main class="container">
        <div class="white-card">
            <h1>Painel do Morador</h1>

            <div class="modules-grid">
                <div class="module">
                    <div class="icon-circle">👤</div>
                    <h3>Meus Dados</h3>
                    <p>Atualize seu perfil</p>
                </div>

                <div class="module">
                    <div class="icon-circle">📅</div>
                    <h3>Reservar Áreas Comuns</h3>
                    <p>Salão, churrasqueira e mais</p>
                </div>
                <div class="module">
                    <div class="icon-circle">👥</div>
                    <h3>Visitantes</h3>
                    <p>Liberação e autorizações</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-left">© 2024 EasyCondo</div>
        <div class="footer-right">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Support</a>
        </div>
    </footer>

</body>
</html>
