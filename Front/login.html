<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Harmony - Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-card">
        <div class="header">
            <div class="logo">🏢</div>
            <p class="brand">PORTAL HARMONY</p>
        </div>

        <h1>Bem-vindo</h1>
        <p class="subtitle">Acesse sua conta para gerenciar seu espaço.</p>

        <form>
            <div class="field">
                <label>E-MAIL OU CPF</label>
                <input type="text" placeholder="Digite seu e-mail ou CPF">
            </div>

            <div class="field">
                <div class="label-row">
                    <label>SENHA</label>
                    <a href="#">Esqueci minha senha</a>
                </div>
                <div class="password-wrapper">
                    <input type="password" placeholder="Digite sua senha">
                    <span class="eye">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn-login">Login →</button>
        </form>

        <div class="divider">ou</div>

        <button class="btn-reg">Primeiro acesso / Cadastrar-se</button>

        <footer class="card-footer">
            © 2024 PORTAL HARMONY. ALL RIGHTS RESERVED.
        </footer>
    </div>

    <div class="external-links">
        <span>💬 Support</span>
        <span>🌐 Português (Brasil)</span>
    </div>

</body>
</html>
