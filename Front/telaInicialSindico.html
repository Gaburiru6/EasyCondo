<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Administrativa - EasyCondo</title>
    <link rel="stylesheet" href="telaInicialSindico.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="nav-content">
            <div class="brand">EasyCondo</div>
            <nav class="nav-links">
                <a href="#" class="active">Dashboard</a>
                <a href="#">Residents</a>
                <a href="#">Reservations</a>
            </nav>
            <div class="nav-right">
                <span class="icon">🔔</span>
                <span class="icon">⚙️</span>
                <div class="user-avatar">👨‍💼</div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="dashboard-white-box">
            
            <div class="dashboard-header">
                <div class="header-left">
                    <p class="tag">GESTÃO ADMINISTRATIVA</p>
                    <h1>Dashboard do Síndico</h1>
                </div>
                <div class="header-right">
                    <p>EasyCondo — Condomínio Residencial ●</p>
                </div>
            </div>

            <div class="metrics-grid">
                
                <div class="card">
                    <div class="card-top">
                        <span class="card-icon">👥</span>
                        <span class="card-label">GERAL</span>
                    </div>
                    <p class="card-title">Moradores Cadastrados</p>
                    <h2 class="number">248</h2>
                    <p class="trend">+12 este mês</p>
                </div>

                <div class="card">
                    <div class="card-top">
                        <span class="card-icon">📅</span>
                        <span class="card-label">HOJE</span>
                    </div>
                    <p class="card-title">Reservas do Dia</p>
                    <div class="tags-row">
                        <span class="tag-blue">SALÃO DE FESTAS</span>
                        <span class="tag-blue">CHURRASQUEIRA</span>
                    </div>
                </div>

                

            </div>
        </div>

        <footer class="main-footer">
            © 2024 EasyCondo — ARCHITECTURAL SERENITY MANAGEMENT
        </footer>
    </main>

</body>
</html>
